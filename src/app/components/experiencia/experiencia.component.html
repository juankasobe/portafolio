<section class="experience section-shell" id="experiencia">
    <div class="section-heading">
        <p class="section-kicker">{{ experience.kicker }}</p>
        <h3 class="section-title">{{ experience.title }}</h3>
    </div>

    @for (item of experience.items; track item.role) {
    <div class="card experience-card">
        <h5 class="card-header text-bg-secondary">{{ item.role }}</h5>
        <div class="card-body">
            <h5 class="card-title">{{ item.company }}</h5>
            <p class="card-text">
                {{ item.descriptionBeforeHighlight }}
                <strong>{{ item.highlightedText }}</strong>
                {{ item.descriptionAfterHighlight }}
            </p>
        </div>
    </div>
    }
</section>
