<section class="contact section-shell" id="contacto">
  <div class="contact-card card">
    <div class="contact-copy">
      <p class="section-kicker">{{ contact.kicker }}</p>
      <h3 class="contact-title">{{ contact.title }}</h3>
      <p class="contact-description">{{ contact.description }}</p>
      <p class="contact-email" aria-label="Correo de contacto">
        <span>{{ contact.emailLabel }}:</span>
        <strong>{{ contact.email }}</strong>
      </p>
    </div>

    <div class="contact-links" aria-label="Enlaces de contacto">
      @for (link of contact.links; track link.href) {
        <a
          class="contact-link"
          [href]="link.href"
          [attr.aria-label]="link.ariaLabel"
          [attr.download]="link.download ?? null"
          [attr.target]="link.external ? '_blank' : null"
          [attr.rel]="link.external ? 'noreferrer' : null"
        >
          <i [class]="link.iconClass" aria-hidden="true"></i>
          <span>{{ link.label }}</span>
        </a>
      }
    </div>
  </div>
</section>
