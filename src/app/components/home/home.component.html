<section class="hero section-shell" id="home">
    <div class="hero-grid">
        <div class="hero-photo-wrap">
            <img [src]="hero.photo.src" [alt]="hero.photo.alt" class="imgPersonal" />
            <div class="hero-badge">{{ hero.badge }}</div>
        </div>
        <div class="hero-copy">
            <p class="section-kicker">
                {{ hero.greeting }} <img [src]="hero.greetingIcon.src" [alt]="hero.greetingIcon.alt" class="icoPersonal mx-1" /> soy
            </p>
            <h1>{{ hero.name }}</h1>
            <h2>{{ hero.headline }}</h2>
            <p class="hero-text">
                {{ hero.description }}
            </p>
            <div class="hero-actions">
                <a class="primary-action" [download]="hero.cv.download" [href]="hero.cv.href" [title]="hero.cv.title">
                    {{ hero.cv.label }}
                </a>
                @for (link of hero.socialLinks; track link.href) {
                    <a class="social-link" [href]="link.href" target="_blank" [title]="link.title" rel="noreferrer">
                        <i [class]="link.iconClass"></i>
                    </a>
                }
            </div>
            <div class="hero-metrics" aria-label="Áreas de enfoque">
                @for (metric of hero.focusMetrics; track metric) {
                    <span>{{ metric }}</span>
                }
            </div>
        </div>
    </div>
</section>
