<section class="projects section-shell" id="proyectos">
      <div class="section-heading">
            <p class="section-kicker">{{ projects.kicker }}</p>
            <h3 class="section-title">{{ projects.title }}</h3>
      </div>

      <div class="projects-grid">
            @for (project of projects.items; track project.title) {
            <article class="card project-card card-hover">
                  <div class="project-media {{ project.mediaClass }}">
                        <img [src]="project.image.src" [class]="project.image.className ?? ''" [alt]="project.image.alt">
                  </div>
                  <div class="card-body">
                        <span class="project-type">{{ project.type }}</span>
                        <h5 class="card-title">{{ project.title }}</h5>
                        <p class="card-text">{{ project.description }}</p>
                        <div class="project-links">
                              @for (link of project.links; track link.href) {
                                    <a [href]="link.href" target="_blank" [title]="link.title" rel="noreferrer">
                                          <i [class]="link.iconClass"></i>
                                    </a>
                              }
                              @for (icon of project.toolIcons; track icon.src) {
                                    <img [src]="icon.src" [alt]="icon.alt" class="icoPersonal" />
                              }
                        </div>
                  </div>
            </article>
            }
      </div>
</section>
